name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - 'develop'
    paths:
      - '.github/workflows/build.yml'
      - 'lidarrmetadata/**'
      - 'poetry.lock'
      - 'pyproject.toml'
  pull_request:
    branches:
      - 'develop'
    paths:
      - '.github/workflows/build.yml'
      - 'lidarrmetadata/**'
      - 'poetry.lock'
      - 'pyproject.toml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

env:
  APP_VERSION: 0.4
  REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/lidarrapi.metadata

permissions:
  packages: write

jobs:
  build_docker:
    name: Build Docker Image
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    runs-on: ${{ startsWith(matrix.platform, 'linux/arm') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update Version Number
        shell: bash
        run: |
          sed -i'' -e "s/10.0.0.0/${{ env.APP_VERSION }}.${{ github.run_number }}/g" lidarrmetadata/__init__.py

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          labels: |
            org.opencontainers.image.authors=${{ github.repository_owner }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate build configuration
        uses: docker/build-push-action@v6
        with:
          call: check

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          tags: ${{ env.REGISTRY_IMAGE }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          build-args: |
            GIT_BRANCH=${{ github.head_ref || github.ref_name }}
            COMMIT_HASH=${{ github.event.pull_request.head.sha || github.sha }}
          provenance: false

      - name: Export image digest
        id: digest-prepare
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          echo "manifest-hash=${digest#sha256:}" >> "$GITHUB_OUTPUT"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v6
        with:
          name: docker-digests-${{ steps.digest-prepare.outputs.manifest-hash }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  docker_merge:
    needs: build_docker
    name: Publish docker multi-platform manifest
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v7
        with:
          path: ${{ runner.temp }}/digests
          pattern: docker-digests-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          labels: |
            org.opencontainers.image.authors=${{ github.repository_owner }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
          tags: |
            type=raw,value=${{ env.APP_VERSION }}.${{ github.run_number }},priority=800,prefix=v,enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=${{ env.APP_VERSION }},priority=700,prefix=v,enable=${{ github.event_name != 'pull_request' }}
            type=ref,event=branch
            type=ref,event=pr
          flavor: |
            latest=false

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.docker_meta.outputs.version }}

      - name: Generate build summary
        run: |
          DIGEST=$(docker buildx imagetools inspect --format '{{json .Manifest.Digest}}' ${{ env.REGISTRY_IMAGE }}:${{ steps.docker_meta.outputs.version }} | jq -r)
          echo "### Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Successfully built and pushed image with tag:** \`${{ steps.docker_meta.outputs.version }}@$DIGEST\`" >> $GITHUB_STEP_SUMMARY
