name: build

on:
  workflow_dispatch:
  push:
    branches:
      - 'develop'
    paths-ignore:
      - '.dockerignore'
      - '.editorconfig'
      - 'docker-compose.yml'
      - 'Makefile'
      - 'LICENSE'
      - '**.md'

  pull_request:
    branches:
      - 'develop'
    paths-ignore:
      - '.dockerignore'
      - '.editorconfig'
      - 'docker-compose.yml'
      - 'Makefile'
      - 'LICENSE'
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

env:
  APP_VERSION: 0.4

permissions:
  packages: write

jobs:
  build_docker:
    name: Build Docker Image
    if: ${{ ! github.event.repository.private }}
    runs-on: 'ubuntu-latest'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Version Number
        shell: bash
        run: |
          sed -i'' -e "s/10.0.0.0/${{ env.APP_VERSION }}.${{ github.run_number }}/g" lidarrmetadata/__init__.py

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/lidarrapi.metadata
          labels: |
            org.opencontainers.image.authors=${{ github.repository_owner }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.APP_VERSION }}.${{ github.run_number }}
          tags: |
            type=raw,value=${{ env.APP_VERSION }},prefix=v
            type=raw,value=${{ env.APP_VERSION }}.${{ github.run_number }},prefix=v
            type=ref,event=branch
          flavor: |
            latest=false

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate build configuration
        uses: docker/build-push-action@v6
        with:
          call: check

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            GIT_BRANCH=${{ github.head_ref || github.ref_name }}
            COMMIT_HASH=${{ github.event.pull_request.head.sha || github.sha }}

      - name: Generate build summary
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          echo "### Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Successfully built and pushed image with tag:** \`v${{ env.APP_VERSION }}.${{ github.run_number }}@${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
